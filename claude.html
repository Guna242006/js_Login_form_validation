<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="w-[100%] h-screen flex justify-center items-center bg-slate-800">
        <div class="w-[70%] md:w-[25%] mx-auto bg-white shadow-lg p-5 rounded-md">
            <div class="text-2xl font-semibold text-center text-green-600">
                <h1>Login</h1>
            </div>
            <form class="flex flex-col gap-5" id="form">
                <div class="flex flex-col">
                    <label class="text-xl">Email :</label>
                    <input type="text" name="Email" placeholder="Enter your email..." id="email"
                        class="border-2 outline-none rounded-md pl-1 py-2">
                    <p class="text-md text-red-500" id="emailError"></p>
                </div>
                <div class="flex flex-col">
                    <label class="text-xl">Password :</label>
                    <!-- FIX: type="password" instead of type="text" -->
                    <input type="password" name="password" placeholder="Enter your password..." id="pass"
                        class="border-2 outline-none rounded-md pl-1 py-2">
                    <p class="text-md text-red-500" id="passError"></p>
                </div>
                <div>
                    <button type="submit" id="subbtn"
                        class="w-full py-3 bg-green-600 text-white rounded-md hover:bg-green-700 transition">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Modal Alert Box -->
    <!-- FIX: Hidden by default with 'hidden' class; shown on successful login -->
    <div id="popup" class="hidden fixed inset-0 flex items-center justify-center z-50">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black opacity-50"></div>
        <!-- Modal Box -->
        <div class="relative bg-white rounded-xl shadow-2xl p-8 w-[90%] max-w-sm text-center z-10">
            <!-- Green checkmark icon -->
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                    <svg class="w-9 h-9 text-green-600" fill="none" stroke="currentColor" stroke-width="2.5"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Success!</h2>
            <p class="text-gray-500 mb-6">Login form submitted successfully.</p>
            <button id="closePopup"
                class="w-full py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-semibold">
                OK
            </button>
        </div>
    </div>

    <script>
        let form = document.getElementById("form");
        let email = document.getElementById("email");
        let pass = document.getElementById("pass");
        let popup = document.getElementById("popup");
        let closePopup = document.getElementById("closePopup");

        // Close modal on OK button click
        closePopup.addEventListener("click", () => {
            popup.classList.add("hidden");
        });

        // Close modal when clicking the backdrop
        popup.addEventListener("click", (e) => {
            if (e.target === popup) {
                popup.classList.add("hidden");
            }
        });

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            regexvalid(email.value, pass.value);
        });

        email.addEventListener("input", (e) => {
            const emailregex = /^\S+@\S+\.\S+$/;
            const emailError = document.getElementById("emailError");
            if (e.target.value === "") {
                emailError.textContent = "Email is Required!";
            } else if (!e.target.value.match(emailregex)) {
                emailError.textContent = "Invalid email format";
            } else {
                emailError.textContent = "";
            }
        });

        pass.addEventListener("input", (e) => {
            const val = e.target.value;
            const passError = document.getElementById("passError");
            const uppercase = /(?=.*?[A-Z])/;
            const lowercase = /(?=.*?[a-z])/;
            const numbers = /(?=.*?[0-9])/;
            const specialchr = /(?=.*?[#?!@$%^&*-])/;

            if (!val.match(uppercase)) {
                passError.textContent = "Must contain one uppercase letter";
            } else if (!val.match(lowercase)) {
                passError.textContent = "Must contain one lowercase letter";
            } else if (!val.match(numbers)) {
                passError.textContent = "Must contain one number";
            } else if (!val.match(specialchr)) {
                passError.textContent = "Must contain one special character";
            } else {
                passError.textContent = "";
            }
        });

        const regexvalid = (emailVal, passVal) => {
            const emailregex = /^\S+@\S+\.\S+$/;
            const passregex = /^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$/;
            const emailError = document.getElementById("emailError");
            // FIX: was 'paasError' (typo) — corrected to 'passError'
            const passError = document.getElementById("passError");

            if (!emailVal.match(emailregex)) {
                emailError.textContent = "Invalid Email...";
            } else {
                emailError.textContent = "";
            }

            if (!passVal.match(passregex)) {
                passError.textContent = "Password must be minimum 8 characters";
            } else {
                passError.textContent = "";
            }

            if (emailVal.match(emailregex) && passVal.match(passregex)) {
                // FIX: Show the custom modal instead of alert(popup)
                popup.classList.remove("hidden");

                // Reset form fields
                document.getElementById("email").value = "";
                document.getElementById("pass").value = "";
                emailError.textContent = "";
                passError.textContent = "";
            }
        };
    </script>
</body>
</html>
